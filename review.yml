  - date: '2026-06-03'
    rating: 4
    summary: >-
      UCL has an unusually mature public developer presence for a university, driven
      by UCL API (uclapi.com) — a student-built, ISD-backed, open-source, OAuth2
      platform whose documentation portal (uclapi.com/docs) and dashboard (uclapi.com)
      returned HTTP 200. A public OpenAPI spec confirms seven service groups: Room
      Bookings, Timetable, Search, Resources, Workspaces, OAuth and Analytics; these
      are catalogued without inventing endpoints. The api.uclapi.com host did not
      resolve from this review environment (recorded status 0) likely due to network
      egress restrictions, not a confirmed outage. UCL Discovery's OAI-PMH endpoint
      returned 403 (protected). The Figshare-powered Research Data Repository
      returned 202. No fabricated endpoints or credentials; access to UCL API
      requires UCL affiliation and is free of charge.
